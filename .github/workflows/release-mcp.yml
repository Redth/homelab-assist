name: Release MCP server

# Builds a homelab-assist native-AOT MCP server for all supported client platforms and attaches the
# binaries to a GitHub Release. Works for ANY server in src/ via a naming convention:
#
#   tag           <name>-mcp-v<semver>     e.g. npm-mcp-v0.1.0, dockhand-mcp-v0.1.0
#   binary/asm    <name>-mcp               e.g. npm-mcp, dockhand-mcp
#   project dir   src/<Name>Mcp            e.g. src/NpmMcp, src/DockhandMcp   (<name> capitalized)
#
# Trigger by pushing a matching tag (must equal the plugin's mcp/<name>/VERSION), or run manually and
# pass the tag name via the `ref_name` input (uploads workflow artifacts instead of a release).

on:
  push:
    tags:
      - '*-mcp-v*'
  workflow_dispatch:
    inputs:
      ref_name:
        description: 'Server tag to build, e.g. dockhand-mcp-v0.1.0 (dispatch uploads artifacts, not a release)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    rid: linux-x64,   ext: '' }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, ext: '' }
          - { os: windows-latest,   rid: win-x64,     ext: '.exe' }
          # osx-x64 cross-compiles on the arm64 macOS runner (avoids the scarce/slow macos-13 Intel runner).
          - { os: macos-latest,     rid: osx-x64,     ext: '' }
          - { os: macos-latest,     rid: osx-arm64,   ext: '' }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve project + binary from tag
        id: r
        shell: bash
        run: |
          TAG="${{ github.event.inputs.ref_name || github.ref_name }}"
          case "$TAG" in
            *-mcp-v*) : ;;
            *) echo "::error::tag '$TAG' does not match <name>-mcp-v<semver>"; exit 1 ;;
          esac
          NAME="${TAG%-v*}"                 # e.g. dockhand-mcp
          BASE="${NAME%-mcp}"               # e.g. dockhand
          CAP="$(printf '%s' "${BASE%"${BASE#?}"}" | tr '[:lower:]' '[:upper:]')${BASE#?}"
          PROJ="${CAP}Mcp"                  # e.g. DockhandMcp
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG -> binary=$NAME, project=src/$PROJ"

      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json

      - name: Publish (Native AOT)
        working-directory: src/${{ steps.r.outputs.proj }}
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o out

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          cp "src/${{ steps.r.outputs.proj }}/out/${{ steps.r.outputs.name }}${{ matrix.ext }}" \
             "staging/${{ steps.r.outputs.name }}-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: staging/${{ steps.r.outputs.name }}-${{ matrix.rid }}${{ matrix.ext }}

      - name: Upload workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.r.outputs.name }}-${{ matrix.rid }}
          path: staging/${{ steps.r.outputs.name }}-${{ matrix.rid }}${{ matrix.ext }}
