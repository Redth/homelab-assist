name: Release npm-mcp

# Builds the npm-mcp Native AOT binary for all supported client platforms and attaches them
# to a GitHub Release. The docker plugin's launcher downloads the matching binary on first run.
#
# Trigger by pushing a tag like `npm-mcp-v0.1.0` (must match plugins/docker/mcp/npm/VERSION),
# or run manually via the Actions tab.

on:
  push:
    tags:
      - 'npm-mcp-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,   rid: linux-x64,   ext: '' }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, ext: '' }
          - { os: windows-latest,  rid: win-x64,     ext: '.exe' }
          - { os: macos-13,        rid: osx-x64,     ext: '' }
          - { os: macos-latest,    rid: osx-arm64,   ext: '' }
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (Native AOT)
        working-directory: src/NpmMcp
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o out

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p staging
          cp "src/NpmMcp/out/npm-mcp${{ matrix.ext }}" "staging/npm-mcp-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: staging/npm-mcp-${{ matrix.rid }}${{ matrix.ext }}
          # The launcher downloads assets named exactly `npm-mcp-<rid>` (no ext on unix).

      - name: Upload workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: npm-mcp-${{ matrix.rid }}
          path: staging/npm-mcp-${{ matrix.rid }}${{ matrix.ext }}
